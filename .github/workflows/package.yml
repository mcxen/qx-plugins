name: Package Plugins

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/package-plugins.mjs'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Package plugins and generate index
        run: npm run package:plugins
      - name: Commit and push
        run: |
          git config user.name "Qx Bot"
          git config user.email "bot@qx.app"
          git add '*.qx-plugin' index.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto-package Qx plugins [skip ci]"
            git push
          fi
